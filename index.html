<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIEL . MON - แหล่งรวมไอดี ฝากขาย Iden</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- สไตล์พื้นฐานและธีมแฟนตาซีเทพนิยาย --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Mitr', sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #201335, #0b1021);
            color: #f1e8ff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            opacity: 0.4;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }

        /* --- ปุ่มกดเพิ่มสินค้า (Admin Button) --- */
        .admin-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #6d28d9, #a855f7);
            color: white;
            border: 1px solid #c084fc;
            padding: 8px 18px;
            border-radius: 50px;
            font-family: 'Mitr', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .admin-toggle-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.7);
            background: linear-gradient(45deg, #7c3aed, #c084fc);
        }

        /* --- ส่วนหัวร้าน --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            margin-top: 20px;
            position: relative;
        }

        .shop-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 10px #a13bf7, 0 0 20px #a13bf7, 0 0 30px #4d0099;
            letter-spacing: 2px;
            margin-bottom: 10px;
            user-select: none;
        }

        .shop-subtitle {
            font-size: 1.2rem;
            color: #d1b3ff;
            font-weight: 300;
        }

        .shop-subtitle span {
            color: #ff4d4d;
            text-shadow: 0 0 8px #ff4d4d;
        }

        /* --- โซนแสดงสินค้า (Product Grid) --- */
        .product-section {
            margin-bottom: 60px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: rgba(25, 18, 46, 0.75);
            border: 2px solid #58338a;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        /* ลูกเล่นขยับตอนเมาส์ชี้ */
        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #c084fc;
            box-shadow: 0 15px 35px rgba(161, 59, 247, 0.35);
        }

        .product-image-box {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #130a21, #2d1b4e);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-id {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #e9d5ff;
            margin-bottom: 8px;
        }

        .product-details {
            font-size: 0.95rem;
            color: #c084fc;
            line-height: 1.6;
            background: rgba(15, 10, 30, 0.6);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #a855f7;
            text-align: left;
            white-space: pre-line;
        }

        /* ปุ่มลบสินค้า */
        .delete-btn {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4d4d;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
            z-index: 10;
        }

        /* --- แผงควบคุมกรอกข้อมูล (Admin Panel) --- */
        .admin-panel {
            display: none;
            background: rgba(20, 12, 38, 0.95);
            border: 2px dashed #a13bf7;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 0 30px rgba(161, 59, 247, 0.2);
        }

        .admin-panel h3 {
            margin-bottom: 15px;
            color: #fff;
            text-shadow: 0 0 10px #a13bf7;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #d1b3ff;
        }

        .admin-panel input[type="text"], 
        .admin-panel textarea,
        .admin-panel input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #0b0716;
            border: 1px solid #58338a;
            border-radius: 8px;
            color: #fff;
            font-family: 'Mitr', sans-serif;
        }

        .admin-panel input:focus, .admin-panel textarea:focus {
            border-color: #a13bf7;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Mitr', sans-serif;
        }

        .btn-save { background: #a13bf7; color: white; }
        .btn-save:hover { background: #b85eff; }
        .btn-close { background: #3c265c; color: #d1b3ff; }

        /* --- ช่องทางติดต่อ (Contact) --- */
        .contact-section {
            background: rgba(18, 11, 36, 0.85);
            border: 1px solid #4c2880;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            max-width: 600px;
            margin: 40px auto 0 auto;
        }

        .contact-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 0 8px #a13bf7;
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-facebook { background: linear-gradient(45deg, #1877f2, #3b5998); color: white; }
        .btn-facebook:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(24, 119, 242, 0.5); }
        .btn-line { background: linear-gradient(45deg, #06c755, #05a345); color: white; }
        .btn-line:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(6, 199, 85, 0.5); }

        /* การจัดวางในมือถือ */
        @media (max-width: 600px) {
            .admin-toggle-btn {
                position: relative;
                top: 0;
                right: 0;
                display: block;
                margin: 0 auto 20px auto;
                text-align: center;
                width: fit-content;
            }
            .shop-title { font-size: 2.5rem; }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 💜 ปุ่มเปิด-ปิดระบบเพิ่มสินค้าอัปเกรดใหม่ 💜 -->
        <button class="admin-toggle-btn" onclick="toggleAdminPanel()">✨ เพิ่มสินค้า</button>

        <!-- ส่วนหัวร้าน -->
        <header>
            <h1 class="shop-title">CHIEL . MON</h1>
            <p class="shop-subtitle">แหล่งรวมไอดี , ฝากขาย <span>Iden 🔴</span></p>
        </header>

        <!-- แผงควบคุมสำหรับอัปโหลดข้อมูล (เปิด-ปิดผ่านปุ่มด้านบน) -->
        <div class="admin-panel" id="adminPanel">
            <h3>✨ แผงควบคุมร้านค้า (ระบบจัดการสินค้า)</h3>
            <div class="form-group">
                <label>อัปโหลดรูปภาพสินค้า:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="form-group">
                <label>รหัสสินค้า (เช่น ID 01):</label>
                <input type="text" id="idInput" placeholder="กรอกรหัสไอดี">
            </div>
            <div class="form-group">
                <label>รายละเอียดไอดี:</label>
                <textarea id="descInput" rows="4" placeholder="กรอกรายละเอียดไอดี..."></textarea>
            </div>
            <div class="btn-group">
                <button class="action-btn btn-save" onclick="saveProduct()">บันทึกและเพิ่มสินค้า</button>
                <button class="action-btn btn-close" onclick="toggleAdminPanel()">ซ่อนแผงควบคุม</button>
            </div>
        </div>

        <!-- โซนแสดงสินค้า -->
        <main class="product-section">
            <div class="product-grid" id="productGrid">
                <!-- ข้อมูลสินค้าที่อัปโหลดจะแสดงตรงนี้อัตโนมัติ -->
            </div>
        </main>

        <!-- ช่องทางติดต่อ -->
        <footer class="contact-section">
            <h2 class="contact-title">✦ Contact ช่องทางติดต่อ ✦</h2>
            <div class="contact-buttons">
                <a href="https://www.facebook.com/share/1CTGfbxK8g/" target="_blank" class="contact-btn btn-facebook">Facebook ร้านค้า</a>
                <a href="https://lin.ee/7pt6TZl" target="_blank" class="contact-btn btn-line">Line Official</a>
            </div>
        </footer>
    </div>

    <!-- สคริปต์ระบบทำงานเบื้องหลัง -->
    <script>
        function toggleAdminPanel() {
            const panel = document.getElementById('adminPanel');
            const deleteButtons = document.querySelectorAll('.delete-btn');
            
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                deleteButtons.forEach(btn => btn.style.display = 'none');
            } else {
                panel.style.display = 'block';
                deleteButtons.forEach(btn => btn.style.display = 'block');
            }
        }

        function saveProduct() {
            const idInput = document.getElementById('idInput').value.trim();
            const descInput = document.getElementById('descInput').value.trim();
            const imageFile = document.getElementById('imageInput').files[0];

            if (!idInput || !descInput || !imageFile) {
                alert("กรุณากรอกข้อมูลและเลือกรูปภาพให้ครบถ้วนนะคะ ✦");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const productData = {
                    id: idInput,
                    desc: descInput,
                    image: e.target.result
                };

                let products = JSON.parse(localStorage.getItem('chielmon_products')) || [];
                products.push(productData);
                localStorage.setItem('chielmon_products', JSON.stringify(products));

                document.getElementById('idInput').value = '';
                document.getElementById('descInput').value = '';
                document.getElementById('imageInput').value = '';
                
                displayProducts();
            };
            reader.readAsDataURL(imageFile);
        }

        function displayProducts() {
            const grid = document.getElementById('productGrid');
            const panel = document.getElementById('adminPanel');
            const isEditing = panel.style.display === 'block';
            
            grid.innerHTML = '';
            let products = JSON.parse(localStorage.getItem('chielmon_products')) || [];

            if (products.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #8b7ca3; font-style: italic; padding: 40px 0;">✦ ขณะนี้ยังไม่มีรายการไอดีในตู้สินค้า ✦</p>`;
                return;
            }

            products.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <button class="delete-btn" style="display: ${isEditing ? 'block' : 'none'}" onclick="deleteProduct(${index})">✕</button>
                    <div class="product-image-box">
                        <img src="${product.image}" alt="${product.id}">
                    </div>
                    <div class="product-id">${product.id}</div>
                    <div class="product-details">${product.desc}</div>
                `;
                grid.appendChild(card);
            });
        }

        function deleteProduct(index) {
            if(confirm("คุณต้องการลบไอเทมนี้ใช่หรือไม่?")) {
                let products = JSON.parse(localStorage.getItem('chielmon_products')) || [];
                products.splice(index, 1);
                localStorage.setItem('chielmon_products', JSON.stringify(products));
                displayProducts();
            }
        }

        window.onload = displayProducts;
    </script>
</body>
</html>
