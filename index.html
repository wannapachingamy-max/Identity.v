 <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIEL . MON - แหล่งรวมไอดี ฝากขาย Iden</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Mitr:wght@300;400;600&family=Chakra+Petch:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- สไตล์ธีมเวทมนตร์คงเดิม --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Mitr', sans-serif;
            background: linear-gradient(135deg, #0b1d16, #143224, #2d1a36);
            color: #f3f9f6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        .leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .leaf { position: absolute; top: -50px; width: 20px; height: 20px; background-size: contain; animation: fall linear infinite; opacity: 0.6; }
        .leaf:nth-child(even) { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23dfb15b"><path d="M17,8C15.24,5.87 11.29,4 7,4C6.23,4 5.5,4.07 4.79,4.21C4.08,5.08 3.62,6.17 3.5,7.37C3,12.31 6.5,17.29 11.5,18.5C11.5,19.5 12,20 12,20C12,20 12.5,19.5 12.5,18.5C16.89,17.44 20.17,13.78 20.5,9.15C20.5,8.74 20.32,8.34 20,8C19.14,8 18.09,8 17,8Z"/></svg>'); }
        .leaf:nth-child(odd) { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23f3a1b4"><path d="M17,8C15.24,5.87 11.29,4 7,4C6.23,4 5.5,4.07 4.79,4.21C4.08,5.08 3.62,6.17 3.5,7.37C3,12.31 6.5,17.29 11.5,18.5C11.5,19.5 12,20 12,20C12,20 12.5,19.5 12.5,18.5C16.89,17.44 20.17,13.78 20.5,9.15C20.5,8.74 20.32,8.34 20,8C19.14,8 18.09,8 17,8Z"/></svg>'); }
        @keyframes fall { 0% { top: -50px; transform: translateX(0) rotate(0deg); } 100% { top: 100vh; transform: translateX(100px) rotate(360deg); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 2; }
        header { text-align: center; margin-bottom: 50px; }
        .shop-title { font-family: 'Cinzel', serif; font-size: 3.5rem; color: #fff; text-shadow: 0 0 15px #dfb15b; letter-spacing: 5px; }

        /* ตู้สินค้า */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: rgba(18, 41, 30, 0.85); border: 2px solid #3c634e; border-radius: 20px; padding: 20px; position: relative; transition: 0.3s; backdrop-filter: blur(10px); }
        .product-card:hover { transform: translateY(-10px); border-color: #dfb15b; }

        .status-tag { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: #fff; z-index: 3; }
        .available { background: #2e7d32; }
        .sold { background: #c62828; }
        .reserved { background: #ef6c00; }
        .installments { background: #0277bd; }

        .img-box { width: 100%; height: 260px; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #2a4b3b; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .p-id { font-family: 'Chakra Petch', sans-serif; font-size: 1.3rem; color: #fff1cc; margin-bottom: 5px; font-weight: 700; }
        .p-desc { font-size: 0.9rem; color: #c9e2d5; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; text-align: left; min-height: 60px; white-space: pre-line; }

        /* ปุ่มลบ */
        .del-btn { display: none; position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #ff4d4d; color: white; border: none; border-radius: 50%; cursor: pointer; font-weight: bold; z-index: 10; }

        /* แผงควบคุมแอดมิน */
        .admin-section { margin-top: 60px; text-align: center; }
        .toggle-admin { background: #dfb15b; color: #0b1d16; padding: 12px 30px; border-radius: 50px; font-weight: 700; border: none; cursor: pointer; font-size: 1rem; }
        .admin-panel { display: none; background: rgba(20, 40, 30, 0.95); border: 2px dashed #dfb15b; border-radius: 20px; padding: 30px; margin-top: 20px; text-align: left; }
        .admin-panel label { display: block; margin-top: 10px; color: #dfb15b; font-size: 0.9rem; }
        .admin-panel input, .admin-panel textarea, .admin-panel select { width: 100%; padding: 10px; margin-top: 5px; background: #08120e; border: 1px solid #3c634e; color: #fff; border-radius: 5px; font-family: 'Mitr', sans-serif; }
        .save-btn { background: #dfb15b; color: #0b1d16; padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; margin-top: 20px; cursor: pointer; width: 100%; font-family: 'Mitr', sans-serif; font-size: 1rem; }

        footer { text-align: center; margin-top: 60px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        .contact-link { color: #dfb15b; text-decoration: none; font-weight: 600; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="leaf-container" id="leafContainer"></div>

    <div class="container">
        <header>
            <h1 class="shop-title">CHIEL . MON</h1>
            <p>แหล่งรวมไอดี ฝากขาย Iden ❤️</p>
        </header>

        <!-- โซนตู้สินค้า -->
        <div class="product-grid" id="mainGrid">
            <!-- ข้อมูลสินค้าขนาดใหญ่จะถูกดึงมาแสดงตรงนี้อย่างปลอดภัย -->
        </div>

        <!-- แผงควบคุมแอดมินด้านล่าง -->
        <div class="admin-section">
            <button class="toggle-admin" onclick="showAdmin()">✨ จัดการตู้สินค้า (เพิ่ม/ลบ)</button>
            
            <div class="admin-panel" id="adminBox" style="display: none;">
                <h3>🛠️ เพิ่มสินค้าใหม่ (รองรับภาพขนาดใหญ่พิเศษ)</h3>
                <label>รูปภาพไอดี:</label>
                <input type="file" id="pImg" accept="image/*">
                
                <label>รหัสไอดี (ID):</label>
                <input type="text" id="pId" placeholder="เช่น ID-001">
                
                <label>สถานะสินค้า:</label>
                <select id="pStatus">
                    <option value="available">ยังอยู่</option>
                    <option value="sold">ขายหมดแล้ว</option>
                    <option value="reserved">ติดจอง</option>
                    <option value="installments">ติดผ่อน</option>
                </select>
                
                <label>รายละเอียดสินค้า:</label>
                <textarea id="pDesc" rows="3" placeholder="ระบุรายละเอียดไอดี..."></textarea>
                
                <button class="save-btn" onclick="addNew()">➕ บันทึกภาพความละเอียดสูงลงตู้สินค้า</button>
            </div>
        </div>

        <footer>
            <p>✦ Contact ✦</p>
            <a href="https://www.facebook.com/share/1CTGfbxK8g/" class="contact-link" target="_blank">Facebook</a>
            <a href="https://lin.ee/7pt6TZl" class="contact-link" target="_blank">Line Official</a>
        </footer>
    </div>

    <script>
        // สร้างใบไม้ร่วงพื้นหลัง
        const leafContainer = document.getElementById('leafContainer');
        if (leafContainer) {
            for (let i = 0; i < 15; i++) {
                const l = document.createElement('div');
                l.className = 'leaf';
                l.style.left = Math.random() * 100 + '%';
                l.style.animationDuration = (Math.random() * 5 + 5) + 's';
                l.style.animationDelay = Math.random() * 5 + 's';
                leafContainer.appendChild(l);
            }
        }

        // --- 🛠️ ระบบฐานข้อมูลฐานข้อมูลความจุสูง INDEXEDDB SYSTEM ---
        const dbName = "ChielMonMegaDB";
        const storeName = "products";
        let db;

        // เปิดการเชื่อมต่อฐานข้อมูลตัวใหญ่
        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.createObjectStore(storeName, { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = function(e) {
            db = e.target.result;
            render(); // เมื่อฐานข้อมูลพร้อม ให้ดึงข้อมูลมาแสดงทันที
        };
        request.onerror = function() {
            console.error("ไม่สามารถเปิดฐานข้อมูล IndexedDB ได้");
        };

        function showAdmin() {
            const box = document.getElementById('adminBox');
            const btns = document.querySelectorAll('.del-btn');
            const isBlock = box.style.display === 'block';
            box.style.display = isBlock ? 'none' : 'block';
            btns.forEach(b => b.style.display = isBlock ? 'none' : 'block');
            if(!isBlock) box.scrollIntoView({ behavior: 'smooth' });
        }

        // ฟังก์ชันบีบอัดรูปภาพและแปลงไฟล์เพื่อให้บันทึกรูปใหญ่ๆ ได้อย่างรวดเร็ว
        function addNew() {
            const idCode = document.getElementById('pId').value.trim();
            const status = document.getElementById('pStatus').value;
            const desc = document.getElementById('pDesc').value.trim();
            const fileInput = document.getElementById('pImg');
            const file = fileInput.files[0];

            if(!idCode || !desc || !file) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนและเลือกรูปภาพด้วยนะครับ ✦");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    // ใช้ Canvas บีบอัดระดับคุณภาพให้เหมาะกับหน้าเว็บเพื่อประสิทธิภาพสูงสุด
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // จำกัดขนาดความกว้างไว้ที่ความคมชัดสูง 1200px (สัดส่วนภาพคงเดิม)
                    const maxW = 1200;
                    const scale = maxW / img.width;
                    if(img.width > maxW) {
                        canvas.width = maxW;
                        canvas.height = img.height * scale;
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }

                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // แปลงกลับเป็น Base64 ที่บีบอัดแล้ว (คุณภาพ 85% คมชัดเท่าเดิมแต่ไฟล์เล็กลงมาก)
                    const optimizedImage = canvas.toDataURL('image/jpeg', 0.85);

                    const newItem = {
                        productId: idCode,
                        status: status,
                        desc: desc,
                        img: optimizedImage
                    };

                    // บันทึกลงคลังข้อมูลขนาดใหญ่ IndexedDB
                    const transaction = db.transaction([storeName], "readwrite");
                    const store = transaction.objectStore(storeName);
                    const addRequest = store.add(newItem);

                    addRequest.onsuccess = function() {
                        // ล้างช่องกรอกข้อมูล
                        document.getElementById('pId').value = '';
                        document.getElementById('pDesc').value = '';
                        fileInput.value = '';
                        
                        render(); // วาดตู้สินค้าใหม่
                        alert("เพิ่มสินค้ารูปภาพความละเอียดสูงเรียบร้อยแล้ว! ✨");
                    };
                    
                    addRequest.onerror = function() {
                        alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
                    };
                };
            };
            reader.readAsDataURL(file);
        }

        // ฟังก์ชันดึงข้อมูลจาก IndexedDB มาแสดงบนเว็บทั้งหมด
        function render() {
            const grid = document.getElementById('mainGrid');
            if (!grid || !db) return;
            grid.innerHTML = '';

            const transaction = db.transaction([storeName], "readonly");
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                const list = getAllRequest.result;
                const box = document.getElementById('adminBox');
                const isEditing = box ? (box.style.display === 'block') : false;

                if (list.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #a1bcae; font-style: italic; padding: 40px 0;">✦ ขณะนี้ยังไม่มีรายการไอดีในตู้สินค้า ✦</p>`;
                    return;
                }

                const statusLabel = {
                    'available': 'ยังอยู่',
                    'sold': 'ขายหมดแล้ว',
                    'reserved': 'ติดจอง',
                    'installments': 'ติดผ่อน'
                };

                list.forEach((item) => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <button class="del-btn" style="display:${isEditing?'block':'none'}" onclick="remove(${item.id})">✕</button>
                        <div class="status-tag ${item.status}">${statusLabel[item.status]}</div>
                        <div class="img-box"><img src="${item.img}" onclick="window.open('${item.img}', '_blank')"></div>
                        <div class="p-id">${item.productId}</div>
                        <div class="p-desc">${item.desc}</div>
                    `;
                    grid.appendChild(card);
                });
            };
        }

        // ฟังก์ชันลบข้อมูลออกจากฐานข้อมูล
        function remove(id) {
            if(!confirm("คุณต้องการลบสินค้าชิ้นนี้ใช่หรือไม่?")) return;
            const transaction = db.transaction([storeName], "readwrite");
            const store = transaction.objectStore(storeName);
            const deleteRequest = store.delete(id);

            deleteRequest.onsuccess = function() {
                render();
            };
        }
    </script>
</body>
</html>
