<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIEL . MON - แหล่งรวมไอดี</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600&family=Mitr:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* --- ใช้สไตล์เดิมจากอันที่แล้ว และเพิ่มส่วน Form --- */
        body { font-family: 'Mitr', sans-serif; background: #0f0c1b; color: #f1e8ff; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        .shop-title { font-size: 3rem; color: #fff; text-shadow: 0 0 20px #a13bf7; }

        /* --- ส่วนฟอร์มเพิ่มสินค้า (Admin Panel แบบง่าย) --- */
        .admin-panel {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #58338a;
            margin-bottom: 50px;
        }
        .form-group { margin-bottom: 15px; }
        input, textarea {
            width: 100%;
            padding: 10px;
            background: #1a112e;
            border: 1px solid #a13bf7;
            color: white;
            border-radius: 8px;
            margin-top: 5px;
        }
        .add-btn {
            background: #a13bf7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .add-btn:hover { background: #bf66ff; }

        /* --- Grid สินค้า --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: rgba(25, 18, 46, 0.8);
            border: 2px solid #58338a;
            border-radius: 15px;
            padding: 15px;
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); border-color: #a13bf7; }
        .img-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #000;
        }
        .product-id { font-weight: 600; font-size: 1.2rem; color: #d1b3ff; }
        .product-desc { font-size: 0.9rem; color: #ccc; margin-top: 5px; white-space: pre-line; }

        .contact { text-align: center; margin-top: 50px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px; }
        .contact a { color: #00ff88; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 class="shop-title">CHIEL . MON</h1>
        <p>เเหล่งรวมไอดี , ฝากขาย Iden 🔴</p>
    </header>

    <div class="admin-panel">
        <h3>✨ เพิ่มรายการสินค้าใหม่</h3>
        <div class="form-group">
            <label>เลือกรูปภาพไอดี:</label>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        <div class="form-group">
            <label>รหัส ID (เช่น ID 01):</label>
            <input type="text" id="idInput" placeholder="กรอกหมายเลขไอดี">
        </div>
        <div class="form-group">
            <label>รายละเอียดไอดี:</label>
            <textarea id="descInput" rows="3" placeholder="กรอกรายละเอียด เช่น สกิน, ตัวละคร, ราคา..."></textarea>
        </div>
        <button class="add-btn" onclick="addProduct()">เพิ่มลงหน้าเว็บ</button>
    </div>

    <div class="product-grid" id="productGrid">
        </div>

    <div class="contact">
        <h3>Contact ช่องทางติดต่อ</h3>
        <p>Facebook: <a href="https://www.facebook.com/share/1CTGfbxK8g/">คลิกที่นี่</a></p>
        <p>Line: <a href="https://lin.ee/7pt6TZl">คลิกที่นี่</a></p>
    </div>
</div>

<script>
    function addProduct() {
        const idText = document.getElementById('idInput').value;
        const descText = document.getElementById('descInput').value;
        const imageFile = document.getElementById('imageInput').files[0];
        const grid = document.getElementById('productGrid');

        if (!idText || !descText || !imageFile) {
            alert("กรุณากรอกข้อมูลและเลือกรูปภาพให้ครบถ้วนนะคะ");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${e.target.result}" class="img-preview">
                <div class="product-id">${idText}</div>
                <div class="product-desc">${descText}</div>
            `;
            grid.appendChild(card);

            // ล้างค่าหลังเพิ่มเสร็จ
            document.getElementById('idInput').value = '';
            document.getElementById('descInput').value = '';
            document.getElementById('imageInput').value = '';
        };
        reader.readAsDataURL(imageFile);
    }
</script>
